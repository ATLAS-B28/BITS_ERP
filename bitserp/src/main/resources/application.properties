spring.application.name=bitserp

# ───── DATABASE ─────
spring.datasource.url=jdbc:postgresql://localhost:5432/bits_erp
spring.datasource.username=postgres
spring.datasource.password=pgAditya28
spring.datasource.driver-class-name=org.postgresql.Driver

# ───── JPA ─────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ───── FLYWAY ─────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ───── PGVECTOR ─────
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=hnsw
spring.ai.vectorstore.pgvector.distance-type=cosine_distance
spring.ai.vectorstore.pgvector.dimensions=1536

# ───── OAUTH2 ─────
spring.security.oauth2.authorizationserver.issuer-uri=http://localhost:8080

# ───── SERVER ─────
server.port=8080
server.error.include-message=on-param
server.error.include-binding-errors=on-param
spring.mvc.formcontent.filter.enabled=false
# ───── LOGGING ─────
logging.level.root=INFO
logging.level.com.example.bitserp=DEBUG
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.level.org.springframework.security.oauth2=TRACE